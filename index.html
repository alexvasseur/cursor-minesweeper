<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Minesweeper</title>
    <script>
      (function () {
        const stored = localStorage.getItem("minesweeper-theme");
        const theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button
      id="themeToggle"
      type="button"
      class="theme-toggle"
      aria-label="Switch to dark mode"
    >
      <svg
        class="theme-icon theme-icon-sun"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2" />
        <path
          d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <svg
        class="theme-icon theme-icon-moon"
        viewBox="0 0 24 24"
        aria-hidden="true"
        focusable="false"
      >
        <path
          d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5Z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <main class="app">
      <header class="app-header">
        <h1>Cursor Minesweeper</h1>
        <p class="last-update">last update on 2026-07-21</p>
      </header>
      <section class="controls card">
        <div class="control">
          <label for="sizeSlider">Board size: <span id="sizeValue">16x16</span></label>
          <input id="sizeSlider" type="range" min="5" max="64" value="16" />
        </div>
        <div class="control">
          <label for="densitySlider">Mine density: <span id="densityValue">15%</span></label>
          <input id="densitySlider" type="range" min="10" max="25" value="15" />
        </div>
        <div class="status-row">
          <button id="newGameBtn" type="button" aria-label="Start new game">🙂 New Game</button>
          <p id="mineCounter" class="counter">Mines: 0</p>
          <p id="timer" class="counter">Time: 0s</p>
        </div>
        <p class="hint">Click to reveal. Shift + click to place or remove a flag.</p>
      </section>

      <section id="resultBanner" class="card result-banner hidden" aria-live="polite">
        <img id="resultBannerLogo" class="result-banner-logo" alt="" />
        <h2 id="resultBannerTitle" class="result-banner-title"></h2>
        <button id="resultBannerNewGameBtn" type="button">New Game</button>
      </section>

      <section class="board-wrap card">
        <div class="board-shell">
          <button id="flagModeBtn" type="button" class="flag-mode-btn" aria-pressed="false">
            🚩 Flag Mode: OFF
          </button>
          <div id="board" class="board" role="grid" aria-label="Minesweeper board"></div>
        </div>
      </section>
    </main>

    <template id="cellTemplate">
      <button type="button" class="cell" role="gridcell" aria-label="Hidden cell"></button>
    </template>

    <script src="./script.js"></script>
  </body>
</html>

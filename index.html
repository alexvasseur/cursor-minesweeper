<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Minesweeper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Cursor Minesweeper</h1>
        <p class="last-update">last update on 2026-07-03</p>
      </header>
      <section class="controls card">
        <div class="control">
          <label for="sizeSlider">Board size: <span id="sizeValue">16x16</span></label>
          <input id="sizeSlider" type="range" min="5" max="64" value="16" />
        </div>
        <div class="control">
          <label for="densitySlider">Mine density: <span id="densityValue">15%</span></label>
          <input id="densitySlider" type="range" min="10" max="25" value="15" />
        </div>
        <div class="status-row">
          <button id="newGameBtn" type="button" aria-label="Start new game">🙂 New Game</button>
          <p id="mineCounter" class="counter">Mines: 0</p>
          <p id="timer" class="counter">Time: 0s</p>
        </div>
        <p class="hint">Click to reveal. Shift + click to place or remove a flag.</p>
      </section>

      <section id="resultBanner" class="card result-banner hidden" aria-live="polite">
        <img id="resultBannerLogo" class="result-banner-logo" alt="" />
        <h2 id="resultBannerTitle" class="result-banner-title"></h2>
        <button id="resultBannerNewGameBtn" type="button">New Game</button>
      </section>

      <section class="board-wrap card">
        <div class="board-shell">
          <button id="flagModeBtn" type="button" class="flag-mode-btn" aria-pressed="false">
            🚩 Flag Mode: OFF
          </button>
          <div id="board" class="board" role="grid" aria-label="Minesweeper board"></div>
        </div>
      </section>
    </main>

    <template id="cellTemplate">
      <button type="button" class="cell" role="gridcell" aria-label="Hidden cell"></button>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
